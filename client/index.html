<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iq-spiral-buddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css"
    />
  </head>
  <body>
    <aside id="sidebar">
      <header class="brand">
        <div class="brand-row">
          <div class="logo-spiral" aria-hidden="true">
            <svg viewBox="0 0 64 64" width="48" height="48">
              <defs>
                <radialGradient id="spiral-glow" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stop-color="#7ee2ff" stop-opacity="0.6" />
                  <stop offset="60%" stop-color="#7ee2ff" stop-opacity="0.12" />
                  <stop offset="100%" stop-color="#7ee2ff" stop-opacity="0" />
                </radialGradient>
                <linearGradient id="spiral-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#7ee2ff" />
                  <stop offset="50%" stop-color="#b794f6" />
                  <stop offset="100%" stop-color="#5fd5ff" />
                </linearGradient>
              </defs>
              <circle cx="32" cy="32" r="30" fill="url(#spiral-glow)" class="spiral-glow-pulse" />
              <g class="spiral-rotate">
                <path
                  d="M32 32 m0 0 a3 3 0 0 1 6 0 a6 6 0 0 1 -12 0 a9 9 0 0 1 18 0 a12 12 0 0 1 -24 0 a15 15 0 0 1 30 0 a18 18 0 0 1 -36 0 a21 21 0 0 1 42 0"
                  fill="none"
                  stroke="url(#spiral-stroke)"
                  stroke-width="2.5"
                  stroke-linecap="round"
                />
                <circle cx="32" cy="32" r="2" fill="#7ee2ff" class="spiral-center-pulse" />
              </g>
            </svg>
          </div>
          <div class="brand-text">
            <h1 class="brand-title">spiral buddy</h1>
          </div>
        </div>

        <div class="model-selector">
          <label class="model-label" for="model-select">모델</label>
          <div class="model-wrap">
            <select id="model-select" class="model-select">
              <option value="">loading…</option>
            </select>
            <span class="model-tier-badge" id="model-tier-badge"></span>
          </div>
        </div>
      </header>

      <section class="roadmap-selector" id="roadmap-section">
        <h2>Roadmap</h2>
        <button id="roadmap-current" class="roadmap-current">
          <span class="roadmap-name">loading…</span>
          <span class="caret">▼</span>
        </button>
        <div id="roadmap-list" class="roadmap-list hidden"></div>
      </section>

      <section class="suggestion" id="suggestion-box">
        <div class="loading">🧭 Analyzing trajectory…</div>
      </section>

      <section class="chapters">
        <h2>Chapters</h2>
        <ol id="chapter-list" class="list">
          <li class="loading">loading…</li>
        </ol>
      </section>

      <section class="history">
        <h2>Past sessions (이 로드맵)</h2>
        <ol id="history-list" class="list">
          <li class="loading">loading…</li>
        </ol>
      </section>
    </aside>

    <main id="main">
      <header id="topbar">
        <button id="sidebar-toggle" class="sidebar-toggle" title="사이드바 토글 (Cmd+B)" aria-label="사이드바 토글">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </button>
        <div id="current-chapter">
          <span class="placeholder-text">Select a chapter to start</span>
        </div>
        <div id="actions">
          <button id="quiz-btn" class="action-btn quiz" disabled title="짧은 자가확인 질문 받기">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
              <circle cx="12" cy="12" r="10"/>
            </svg>
            <span>Quiz</span>
          </button>
          <button id="end-btn" class="action-btn end" disabled title="세션 종료 + 노트 생성">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
              <polyline points="17 21 17 13 7 13 7 21"/>
              <polyline points="7 3 7 8 15 8"/>
            </svg>
            <span>End &amp; Save</span>
          </button>
        </div>
      </header>

      <div id="messages" class="messages">
        <div class="placeholder">
          <p>왼쪽에서 챕터를 골라 세션을 시작하거나,</p>
          <p><strong>Start with suggestion</strong> 버튼으로 추천 챕터를 시작하세요.</p>
        </div>
      </div>

      <form id="input-form" class="composer">
        <textarea
          id="input"
          rows="3"
          placeholder="세션을 시작하면 입력할 수 있어요"
          disabled
        ></textarea>
        <button type="submit" id="send-btn" class="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          <span>Send</span>
        </button>
      </form>

      <div id="status-bar" class="status-bar"></div>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
