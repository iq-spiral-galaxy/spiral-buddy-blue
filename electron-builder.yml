appId: com.iq-lab.spiral-buddy
# v0.5.96 — productName을 "Spiral Buddy Blue"로 변경 (Red/Green과 동일 구조).
# 이렇게 하면 .app 파일명 = "Spiral Buddy Blue.app"이 되어 dock 호버 이름이
# 영구히 "Spiral Buddy Blue"로 뜬다(dock은 고정 시점의 .app 파일명을 캐시함 —
# CFBundleName/CFBundleDisplayName은 dock과 무관, v0.5.92~95 삽질의 교훈).
# productName이 곧 CFBundleName·Helper 이름·dmg·volume을 모두 결정하므로
# 과거의 afterPack(Helper rename)·extendInfo(CFBundleName override) 꼼수는 불필요.
# ⚠ appId(=com.iq-lab.spiral-buddy)와 package.json name(=iq-spiral-buddy)은 불변 →
#   userData 경로 유지 → 기존 사용자 API 키/설정 보존. 단 .app 파일명이 바뀌므로
#   기존 설치자는 v0.5.95→96 자동업데이트로 못 넘어오고 1회 수동 재설치 필요.
productName: Spiral Buddy Blue
copyright: © 2026 iq-lab

# 안전한 기본값: asar 끔. 자식 프로세스에서 dist/server.js를 process.execPath로 실행하므로
# unpack 처리 신경 안 써도 됨. 사이즈 약간 늘지만 안정성 우선.
asar: false

directories:
  output: release
  buildResources: electron/build

# 패키징할 파일 목록
files:
  - electron/**/*
  - dist/**/*
  - client/**/*
  - data/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/tsconfig*.json"
  - "!.env*"
  - "!.claude/**"
  - "!docs/**"
  - "!scripts/**"

# extraResources에 둘 것 없음 — 모두 files에 포함

mac:
  category: public.app-category.education
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Apple Developer ID 없이 ad-hoc 서명 ("-"). identity: null은 서명을 완전히 끄는 것이고
  # 그 경우 macOS Sequoia에서 즉시 "손상됨" 표시. ad-hoc은 일부 환경에서 우회됨.
  # 그래도 안 되면 사용자는 README 안내대로 `xattr -cr` 실행 필요.
  identity: "-"
  hardenedRuntime: false
  gatekeeperAssess: false
  # CFBundleName/Helper 이름은 productName("Spiral Buddy Blue")에서 자동 도출됨 —
  # extendInfo override·afterPack Helper-rename 불필요(v0.5.96에서 제거).

dmg:
  title: Spiral Buddy Blue ${version}
  writeUpdateInfo: false

win:
  target:
    - target: nsis
      arch:
        - x64
  # code signing 없이 빌드 — Windows Defender SmartScreen 경고 뜸 (사용자 무시 가능)

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  # 바로가기 표시명 — productName과 동일하지만 명시 유지.
  shortcutName: Spiral Buddy Blue

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Education

# GitHub Releases 발행 (CI에서 환경변수 GH_TOKEN 사용)
# v0.5.87 — iq-spiral-galaxy/spiral-buddy-blue로 이전
publish:
  provider: github
  owner: iq-spiral-galaxy
  repo: spiral-buddy-blue
  releaseType: release
