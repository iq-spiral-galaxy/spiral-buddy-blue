appId: com.iq-lab.spiral-buddy
productName: Spiral Buddy
copyright: © 2026 iq-lab

# 안전한 기본값: asar 끔. 자식 프로세스에서 dist/server.js를 process.execPath로 실행하므로
# unpack 처리 신경 안 써도 됨. 사이즈 약간 늘지만 안정성 우선.
asar: false

directories:
  output: release
  buildResources: electron/build

# 패키징할 파일 목록
files:
  - electron/**/*
  - dist/**/*
  - client/**/*
  - data/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/tsconfig*.json"
  - "!.env*"
  - "!.claude/**"
  - "!docs/**"
  - "!scripts/**"

# extraResources에 둘 것 없음 — 모두 files에 포함

mac:
  category: public.app-category.education
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Apple Developer ID 없이 ad-hoc 서명 ("-"). identity: null은 서명을 완전히 끄는 것이고
  # 그 경우 macOS Sequoia에서 즉시 "손상됨" 표시. ad-hoc은 일부 환경에서 우회됨.
  # 그래도 안 되면 사용자는 README 안내대로 `xattr -cr` 실행 필요.
  identity: "-"
  hardenedRuntime: false
  gatekeeperAssess: false
  # dock/Finder 표시명만 "Spiral Buddy Blue"로 — CFBundleDisplayName으로.
  # productName 자체를 바꾸면 .app 파일명/설치 경로/dmg 볼륨명/asset 파일명이
  # 전부 바뀌어 기존 사용자의 (이미 배포된) 업데이트 스크립트가 깨짐.
  #
  # ⚠ v0.5.94 — CFBundleName은 절대 바꾸지 말 것.
  # v0.5.92에서 CFBundleName도 "Spiral Buddy Blue"로 바꿨더니, Electron이
  # CFBundleName으로 Helper 앱 이름(<name> Helper.app)을 유추하는데 실제
  # Helper는 productName 기준 "Spiral Buddy Helper.app"로 패키징되어 이름이
  # 어긋남 → 런타임이 "Unable to find helper app" FATAL → Apple Silicon에서
  # GUI 실행 즉시 EXC_BREAKPOINT 크래시 루프. 표시명은 CFBundleDisplayName
  # 하나로 충분하므로 CFBundleName은 기본값(productName)을 유지한다.
  extendInfo:
    CFBundleDisplayName: Spiral Buddy Blue

dmg:
  title: Spiral Buddy ${version}
  writeUpdateInfo: false

win:
  target:
    - target: nsis
      arch:
        - x64
  # code signing 없이 빌드 — Windows Defender SmartScreen 경고 뜸 (사용자 무시 가능)

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  # v0.5.92 — 시작메뉴/바탕화면 바로가기 표시명 (설치 경로는 불변)
  shortcutName: Spiral Buddy Blue

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Education

# GitHub Releases 발행 (CI에서 환경변수 GH_TOKEN 사용)
# v0.5.87 — iq-spiral-galaxy/spiral-buddy-blue로 이전
publish:
  provider: github
  owner: iq-spiral-galaxy
  repo: spiral-buddy-blue
  releaseType: release
