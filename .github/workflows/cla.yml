name: CLA Assistant

# 외부 기여(PR) 머지 전에 CLA 동의를 강제하고, 서명 기록을 이 레포 안에 저장한다.
# (CLA Assistant Lite — 외부 서비스/GitHub App 의존 없음. 기존 DCO와 같은 self-contained 방식.)
#
# 동작:
#  - PR이 열리면 봇이 미서명 기여자에게 CLA 동의를 요청하는 코멘트를 남김.
#  - 기여자가 PR에 지정 문구를 코멘트하면 서명으로 기록 (이름 + 시각 + CLA 버전을
#    signatures/version1/cla.json 에 커밋).
#  - 모든 기여자가 서명해야 CLA 체크가 통과(머지 가능 상태).
#  - 서명 후 CLA.md가 바뀌면 'recheck' 코멘트로 재검사 가능.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          # 같은 레포에 서명을 저장하므로 내장 토큰으로 충분 (PAT 불필요).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/iq-spiral-galaxy/spiral-buddy-blue/blob/main/CLA.md'
          branch: 'main'
          # 메인테이너 본인 + 봇은 서명 면제
          allowlist: dongheeHan,*[bot]
          custom-notsigned-prcomment: |
            기여 고마워요! 🙏 머지하려면 [CLA](https://github.com/iq-spiral-galaxy/spiral-buddy-blue/blob/main/CLA.md)에 한 번 동의가 필요해요.
            아래 문구를 **이 PR에 그대로 코멘트**로 남겨주시면 서명됩니다 (이름·시각·CLA 버전이 기록돼요):
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: '✅ 모든 기여자가 CLA에 서명했어요 — 고마워요! 리뷰 진행할게요.'
