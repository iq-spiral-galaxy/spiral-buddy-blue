name: Release

# v* 태그 push 시 macOS/Windows/Linux 빌드 + GitHub Releases에 자동 업로드
# 예: git tag v0.4.0 && git push origin v0.4.0

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11.1.1+가 node:sqlite (Node 22.13+) 빌트인을 요구
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # version은 package.json의 packageManager 필드에서 자동으로 가져옴.
          # 명시하면 두 곳이 충돌(ERR_PNPM_BAD_PM_VERSION).
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm exec tsc

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing은 skip (자가서명/notarization은 후속 단계)
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm exec electron-builder --publish always

      - name: Upload artifacts (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spiral-buddy-${{ runner.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.yml
          if-no-files-found: ignore

  # 3개 OS 빌드 끝나면 release body에 사용자 안내문 자동 작성
  release-notes:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          cat > NOTES.md <<'EOF'
          # Spiral Buddy ${TAG_PLACEHOLDER}

          ## 다운로드

          | OS | 파일 |
          |---|---|
          | macOS Apple Silicon | `Spiral-Buddy-*-arm64.dmg` |
          | macOS Intel | `Spiral-Buddy-*.dmg` (arm64 아닌 것) |
          | Windows | `Spiral-Buddy-Setup-*.exe` |
          | Linux | `Spiral-Buddy-*.AppImage` |

          ## ⚠️ macOS — "손상됨" 경고가 뜨면

          Code signing/공증을 안 한 빌드라 macOS Gatekeeper가 차단합니다 (실제 손상 아님).
          터미널에서 아래 명령 한 번만 실행하면 풀립니다:

          ```bash
          # .app을 Applications로 옮긴 뒤
          xattr -cr "/Applications/Spiral Buddy.app"
          ```

          ## ⚠️ Windows — SmartScreen 경고가 뜨면

          "추가 정보" → "실행" 클릭. 코드는 모두 공개되어 있습니다.

          ## 사용 방법

          1. 본인 OS 파일 다운로드 → 더블클릭
          2. Setup wizard에서 **API 키** + **Obsidian Vault 경로** 입력
             - Vault는 흔한 위치에서 자동 감지됨 (클릭 한 번)
          3. (선택) **"iq-dev-lab 38개 자동 다운로드"** 카드 클릭 → 부모 폴더 선택 → 1~5분 대기
          4. "시작하기" → 메인 앱

          ## 자세한 안내

          [README](https://github.com/iq-agent-lab/iq-spiral-buddy/blob/main/README.md)
          EOF
          # ${TAG} 치환
          sed -i "s/\${TAG_PLACEHOLDER}/${TAG}/g" NOTES.md
          gh release edit "$TAG" --notes-file NOTES.md
