name: Release

# v* 태그 push 시 macOS/Windows/Linux 빌드 + GitHub Releases에 자동 업로드
# 예: git tag v0.4.0 && git push origin v0.4.0

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # version은 package.json의 packageManager 필드에서 자동으로 가져옴.
          # 명시하면 두 곳이 충돌(ERR_PNPM_BAD_PM_VERSION).
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm exec tsc

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing은 skip (자가서명/notarization은 후속 단계)
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm exec electron-builder --publish always

      - name: Upload artifacts (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spiral-buddy-${{ runner.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.yml
          if-no-files-found: ignore
